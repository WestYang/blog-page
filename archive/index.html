---
layout: default
title: 归档
---

<div class="page-content">
  <h1>文章归档</h1>
  
  <h2>2026年04月</h2>
  <ul class="post-list">
    {% for post in site.posts %}
      {% if post.date | date: "%Y年%m月" == "2026年04月" %}
        <li>
          <span class="post-meta">{{ post.date | date: "%d日" }}</span>
          <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
        </li>
      {% endif %}
    {% endfor %}
  </ul>
</div>
