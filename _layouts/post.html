---
layout: default
---

<div class="post-content">
  <h1>{{ page.title }}</h1>
  <span class="post-meta">{{ page.date | date: "%Y年%m月%d日" }}</span>
  {% if page.categories %}
    <span class="post-meta">
      分类: {% for category in page.categories %}{{ category }}{% if forloop.last == false %}, {% endif %}{% endfor %}
    </span>
  {% endif %}
  
  <div class="post-body">
    {{ content | markdownify }}
  </div>
</div>
