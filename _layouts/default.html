<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} - {{ site.name }}{% else %}{{ site.name }}{% endif %}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | prepend: site.baseurl }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ "/feed.xml" | prepend: site.baseurl }}">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title"><a href="{{ site.baseurl }}">{{ site.name }}</a></h1>
      <nav class="site-nav">
        <ul>
          {% for nav in site.nav_menu %}
            <li><a href="{{ nav.url | prepend: site.baseurl }}">{{ nav.name }}</a></li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ site.time | date: "%Y" }} {{ site.author.name }}</p>
      <p>{{ site.description }}</p>
    </div>
  </footer>

  <script>
    // 为每个代码块添加复制按钮
    document.addEventListener('DOMContentLoaded', function() {
      const codeBlocks = document.querySelectorAll('.post-content pre');
      
      codeBlocks.forEach(function(block) {
        // 创建复制按钮
        const button = document.createElement('button');
        button.className = 'code-copy-button';
        
        // 添加点击事件
        button.addEventListener('click', function() {
          const code = block.querySelector('code');
          const text = code.textContent;
          
          // 复制到剪贴板
          navigator.clipboard.writeText(text).then(function() {
            // 显示复制成功状态
            button.classList.add('copied');
            setTimeout(function() {
              button.classList.remove('copied');
            }, 2000);
          });
        });
        
        // 将按钮添加到代码块
        block.appendChild(button);
      });
    });
  </script>
</body>
</html>
